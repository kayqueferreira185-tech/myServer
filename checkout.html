<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalize seu pagamento</title>
    <meta name="author" content="Kayque Ferreira">
    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="stylesheet" href="./CSS/checkout.css">
    <script type="module" src="JS/checkout.js" defer></script>
</head>
<body>
    <header class="titulo-pagamento">
        <h1>Área de pagamentos</h1>
    </header>
    <main class="area-checkout">
   <div class="checkout-esquerda">
    <section class="dados-user">
       <h2>Digite aqui seus dados</h2> 
        <form class="dados-usuario">
            <label for="nome">Nome Completo</label>
            <input class="input-padrao" type="text" id="nome" name="nome" placeholder="Ex: João da Silva">
            <label for="email">Email</label>
            <input class="input-padrao" type="email" id="email" name="email" placeholder="exemplo@email.com">
            <label for="telefone">Telefone</label>
            <input class="input-padrao" type="tel" id="telefone" name="telefone" placeholder="(11) 989968626">
        </form>
    </section>   
    <section class="area-pagamento">
       <h2>Informações de pagamento</h2> 
        <div class="botoesCheckout-CTA">
            <button class="botaoCheckout-cartao">Pagamento cartão</button>
            <button class="botaoCheckout-pix">Pagamento pix</button>
        </div>
        <div class="area-cartao">
          <form class="formulario-pagamento">
                <label for="numero-cartao">Número cartão:</label>
                <input class="input-padrao" type="text" maxlength="19" id="numero-cartao" placeholder="Ex: 4564 8585 7575 3546" name="numeroCartao">
                <label for="validade">Validade do cartão:</label> 
                <input class="input-padrao" type="text" maxlength="10" id="validade" name="validade" placeholder="24/11">
                <label for="cvv">Cvv:</label>
                <input class="input-padrao" type="password" maxlength="3" id="CVC" name="codigoValidade" placeholder="Ex:123">
          </form> 
        </div>   
        <div class="area-pix hidden">
            <img src="assets/imagens/qr-code-plus.png" alt="QR code para pagamento via pix">
            <span>pix apenas para fins de portfólio</span>
     
        </div>
        </section> 
    </div>  
      
       <aside class="checkout-resumo">   
        <section class="area-identificacao">
            <div class="checkout-card">
             <h2>Descrição de compra</h2>
            </div>
        </section>
   </aside> 
    </main>
<footer>
    <nav class="links-footer">
        <ul class="lista-ajuda-footer">
          <li><a href="#">Central de ajuda</a></li>
           <li><a href="#">Suporte</a></li>
           <li><a href="#">Dúvidas frequentes</a></li>
        </ul>
    </nav>
    <p>© 2026 MYSERVER. Todos os direitos reservados.</p>
</footer>
</body>
</html>
