<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalize seu pagamento</title>
    <meta name="author" content="Kayque Ferreira">
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
    <header>
        <h1>Área de pagamentos</h1>
    </header>
    <main class="area-checkout">
    <section class="area-identificacao">
        <h2>Descrição de compra</h2>
    </section>
    <section class="resumo-valores">
        <h2>Consulte aqui os valores do seu plano</h2>
    </section>
    <section class="dados-user">
       <h2>Digite aqui seus dados</h2> 
        <form class="dados-usuario">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" placeholder="Ex: João da Silva">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="exemplo@email.com">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(11) 989968626">
        </form>
    </section>   
    <section class="area-pagamento">
       <h2>Informações de pagamento</h2> 
        <div class="botoesCheckout-CTA">
            <button>Pagamento via cartão</button>
            <button>Pagamento via pix</button>
        </div>
        <div class="area-cartao">
          <form class="formulario-pagamento">
                <label for="numero-cartao">Número cartão:</label>
                <input type="text" maxlength="19" id="numero-cartao" placeholder="Ex: 4564 8585 7575 3546" name="numeroCartao">
                <label for="validade">Válidade do cartão:</label> 
                <input type="text" maxlength="10" id="validade" name="validade" placeholder="24/11">
                <label for="cvv">Cvv:</label>
                <input type="password" maxlength="3" id="cvv" name="codigoValidade" placeholder="Ex:123">
          </form> 
        </div>
        <div class="area-pix">
            <img src="assets/imagens/qr-code-plus.png" alt="QR code para pagamento via pix">
            <span>pix apenas para fins de portfólio</span>
        </div>
    </section>
    </main>
<footer>
    <nav class="links-footer">
        <ul class="lista-ajuda-footer">
          <li><a href="#">Central de ajuda</a></li>
           <li><a href="#">Suporte</a></li>
           <li><a href="#">Dúvidas frequentes</a></li>
        </ul>
    </nav>
    <p>© 2026 MYSERVER. Todos os direitos reservados.</p>
</footer>
</body>
</html>
